<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>山葡萄編みのかごバッグ 遠野 | 時を編み、暮らしを育む</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { navy: '#1a2c4e', gold: '#c9a96e', cream: '#fcfaf5', text: '#2b2b2b' }
                    },
                    fontFamily: {
                        serif: ['"Shippori Mincho"', 'serif'],
                        display: ['"Playfair Display"', 'serif'],
                        sans: ['"Montserrat"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* JSコードの .is-show に合わせた設定 */
        .js-fadein {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1.5s ease-out, transform 1.5s ease-out;
        }
        .js-fadein.is-show {
            opacity: 1 !important;
            transform: translateY(0) !important;
        }
        .text-shadow-strong {
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }
        /* ヒーローコピー専用の即時フェードイン */
        .hero-visible {
            animation: heroFade 2s ease-out forwards;
        }
        @keyframes heroFade {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-brand-cream text-brand-text font-sans">

    <!-- Navigation -->
    <nav id="navbar" class="fixed w-full z-[900] bg-white/90 py-6 border-b border-brand-gold/10 transition-all duration-500">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <a href="#" class="flex flex-col">
                <span class="font-display font-bold text-xl md:text-2xl tracking-[0.2em] text-brand-navy leading-none">Yamabudouami</span>
                <span class="text-[8px] uppercase tracking-[0.5em] text-brand-gold font-semibold mt-1">Tono Iwate Japan</span>
            </a>
            <div class="hidden md:flex space-x-10 text-[10px] tracking-widest uppercase font-bold text-brand-navy">
                <a href="#about" class="hover:text-brand-gold">About</a>
                <a href="#quality" class="hover:text-brand-gold">Quality</a>
                <a href="#gallery" class="hover:text-brand-gold">Gallery</a>
                <a href="#order" class="hover:text-brand-gold">Order</a>
            </div>
            <!-- Mobile Menu Toggle (JavaScriptで制御) -->
            <button id="menu-toggle" class="md:hidden text-brand-navy focus:outline-none">
                <i data-lucide="menu" size="32"></i>
            </button>
        </div>
    </nav>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="fixed inset-0 z-[800] bg-brand-navy text-white translate-x-full transition-transform duration-500 hidden flex flex-col justify-center items-center space-y-8 text-xl tracking-[0.3em] font-serif">
        <a href="#about" class="mobile-nav-link">About</a>
        <a href="#quality" class="mobile-nav-link">Quality</a>
        <a href="#gallery" class="mobile-nav-link">Gallery</a>
        <a href="#order" class="mobile-nav-link">Order</a>
    </div>

    <!-- Hero Section -->
    <section id="home" class="relative h-screen flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 grid grid-cols-1 md:grid-cols-4 h-full">
            <img src="kagoami.jpg" class="w-full h-full object-cover grayscale-[0.2]" alt="">
            <img src="rose.jpg" class="hidden md:block w-full h-full object-cover grayscale-[0.2]" alt="">
            <img src="https://i.imgur.com/REzif58.jpeg" class="hidden md:block w-full h-full object-cover grayscale-[0.2]" alt="">
            <img src="https://i.imgur.com/7Xeudqk.jpeg" class="hidden md:block w-full h-full object-cover grayscale-[0.2]" alt="">
        </div>
        <div class="absolute inset-0 bg-black/40"></div>
        
        <!-- Hero Copy: JSを待たずにアニメーションさせるクラスに変更 -->
        <div class="relative z-10 text-center text-white px-6 hero-visible">
            <h1 class="text-4xl md:text-6xl tracking-[0.4em] font-serif font-bold mb-8 text-shadow-strong leading-tight">
                時を編み、<br class="md:hidden">暮らしを育む。
            </h1>
            <p class="text-[10px] md:text-sm tracking-[0.8em] uppercase text-brand-gold font-bold bg-brand-navy/90 inline-block px-10 py-4 border border-brand-gold/30 shadow-2xl">
                Yamabudouami Tono
            </p>
        </div>
    </section>

    <!-- 浮き出しキャッチコピー -->
    <div class="relative z-20 -mt-32 flex justify-center px-6">
        <div class="max-w-4xl w-full bg-white py-16 md:py-24 px-8 border border-brand-gold/20 shadow-2xl text-center js-fadein">
            <h3 class="text-brand-navy font-serif text-2xl md:text-4xl tracking-[0.3em] mb-8 leading-relaxed">
                遠野の森が育む、<br class="md:hidden">琥珀色の手仕事。
            </h3>
            <p class="text-brand-gold font-sans text-[10px] md:text-xs tracking-[0.6em] uppercase font-bold">Tono Yamabudou Craftsmanship</p>
            <div class="w-[1px] h-20 bg-brand-gold/40 mx-auto mt-12"></div>
        </div>
    </div>

    <!-- 他のセクションは同様に js-fadein を使用 -->
    <section id="about" class="py-40 bg-brand-cream">
        <div class="max-w-7xl mx-auto px-6">
            <div class="grid md:grid-cols-2 gap-16 items-center">
                <img src="https://picsum.photos/seed/craftsman/800/1000" class="shadow-2xl js-fadein" alt="">
                <div class="space-y-8 text-lg font-serif js-fadein">
                    <h2 class="text-3xl font-bold text-brand-navy">作り手について</h2>
                    <p>岩手県遠野市在住。一編みずつ丁寧に、心を込めて形にする手仕事に魅了されています。</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Back to Top Button (JSで制御) -->
    <button id="back-to-top" class="fixed bottom-10 right-10 z-[999] bg-brand-navy text-brand-gold w-12 h-12 rounded-full hidden items-center justify-center shadow-2xl hover:bg-brand-gold hover:text-brand-navy transition-all">
        <i data-lucide="chevron-up"></i>
    </button>

    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- ここに提供いただいたJavaScriptコードを貼り付け、または読み込んでください -->
    <script>
        /* ここに提供いただいたJSコードを配置 */
    </script>
</body>
</html>
